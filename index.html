<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanilla JS Todo App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4 text-center">Todo List</h1>

        <form id="new-todo-form" class="d-flex gap-2 mb-4">
            <input type="text" id="new-todo-input" class="form-control" placeholder="Add a new task..." required>
            <button type="submit" class="btn btn-primary">Add</button>
        </form>

        <ul id="todo-list" class="list-group"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
